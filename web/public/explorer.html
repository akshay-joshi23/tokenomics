  function formatCompactCurrency(value) {

  function sampleApi(item, domain) {
    return [[domain[0], item.cost(domain[0])], [domain[1], item.cost(domain[1])]];

    const points = [[domain[0], item.cost(domain[0])]];
    const firstBoundary = Math.max(1, Math.ceil(domain[0] / item.capacity));
    const lastBoundary = Math.floor(domain[1] / item.capacity);
    for (let n = firstBoundary; n &lt;= lastBoundary; n += 1) {
      const boundary = n * item.capacity;
      if (boundary &gt; domain[0] &amp;&amp; boundary &lt; domain[1]) {
        points.push([boundary, n * item.nodeCost]);
        points.push([boundary * (1 + 1e-9), (n + 1) * item.nodeCost]);

    }
    points.push([domain[1], item.cost(domain[1])]);
    return points;

    const values = candidates.filter(function (v) { return v &gt;= domain[0] &amp;&amp; v &lt;= domain[1]; });
    if (values.length &gt;= 2 &amp;&amp; values.length &lt;= 7) return values;
    const filtered = values.filter(function (v) {
      const mantissa = v / Math.pow(10, Math.floor(Math.log10(v)));
      return Math.abs(mantissa - 1) &lt; 1e-9 || v === 300000;

    if (filtered.length &gt;= 2) return filtered;
    return [domain[0], Math.sqrt(domain[0] * domain[1]), domain[1]];

          formatCompactCurrency(item.cost(1)) + &quot;/M&quot;;
      }
    });
  }

      grok: &quot;Grok 4.5&quot;,
      deepseek: &quot;DeepSeek direct&quot;,
      akash: &quot;Akash Llama&quot;,
      owned: &quot;Owned Llama&quot;
    };
    takeaway.textContent = &quot;At &quot; + formatTokensLong(selectedTokensM) + &quot;: &quot; +
      shortNames[cheapest.id] + &quot; is cheapest at &quot; + formatExactCurrency(cheapest.cost(selectedTokensM)) + &quot;. &quot; +
      comparisonToGpt(&quot;Owned Llama&quot;, ownedCost, gptCost) + &quot;; &quot; +
      comparisonToGpt(&quot;Akash Llama&quot;, akashCost, gptCost) + &quot;.&quot;;
  }

  function updateSelection() {
    const maxForView = viewMode === &quot;focus&quot; ? focusMaxTokensM : maxTokensM;
    selectedTokensM = Math.max(minTokensM, Math.min(maxForView, selectedTokensM));
    readout.textContent = formatTokensLong(selectedTokensM) + &quot; · &quot; +
      formatRequests(selectedTokensM) + &quot; standardized 35K-token requests&quot;;
    slider.value = String(tokensToSlider(selectedTokensM));
    updateLegendValues();
    updateTakeaway();

    if (!plot || !xView || !yScale) return;
    const x = xView(selectedTokensM);
    const inside = x &gt;= 0 &amp;&amp; x &lt;= innerWidth;
    plot.select(&quot;.crosshair&quot;)
      .attr(&quot;display&quot;, inside ? null : &quot;none&quot;)
      .attr(&quot;x1&quot;, x)
      .attr(&quot;x2&quot;, x)
      .attr(&quot;y1&quot;, 0)
      .attr(&quot;y2&quot;, innerHeight);

    const marks = plot.select(&quot;.selection-layer&quot;)
      .selectAll(&quot;path&quot;)
      .data(visibleSeries(), function (d) { return d.id; });

    marks.exit().remove();
    marks.enter()
      .append(&quot;path&quot;)
      .attr(&quot;class&quot;, &quot;selection-mark&quot;)
      .merge(marks)
      .attr(&quot;display&quot;, inside ? null : &quot;none&quot;)
      .attr(&quot;d&quot;, function (d) { return d3.symbol().type(d.marker).size(d.group === &quot;frontier&quot; ? 42 : 64)(); })
      .attr(&quot;transform&quot;, function (d) { return &quot;translate(&quot; + x + &quot;,&quot; + yScale(d.cost(selectedTokensM)) + &quot;)&quot;; })
      .attr(&quot;fill&quot;, function (d) { return cssVar(d.colorVar); });
  }

  function renderCrossovers(domain) {
    const gptRate = series.find(function (item) { return item.id === &quot;gpt&quot;; }).cost(1);
    const crossoverData = viewMode === &quot;focus&quot; ? [
      {
        id: &quot;owned-gpt&quot;,
        x: ownedNodeMonthly / gptRate,
        y: ownedNodeMonthly,
        label: &quot;Owned beats GPT after 1.07B&quot;,
        colorVar: &quot;--foreground&quot;
      },
      {
        id: &quot;akash-gpt&quot;,
        x: akashNodeMonthly / gptRate,
        y: akashNodeMonthly,
        label: &quot;Akash beats GPT after 3.06B&quot;,
        colorVar: &quot;--viz-series-4&quot;
      }
    ].filter(function (item) { return item.x &gt;= domain[0] &amp;&amp; item.x &lt;= domain[1]; }) : [];

    const annotations = plot.select(&quot;.annotation-layer&quot;)
      .selectAll(&quot;g.crossover&quot;)
      .data(crossoverData, function (d) { return d.id; });

    annotations.exit().remove();
    const entered = annotations.enter().append(&quot;g&quot;).attr(&quot;class&quot;, &quot;crossover&quot;);
    entered.append(&quot;circle&quot;).attr(&quot;class&quot;, &quot;crossover-dot&quot;).attr(&quot;r&quot;, 4);
    entered.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;crossover-label text-small&quot;).attr(&quot;dy&quot;, -10);

    const merged = entered.merge(annotations)
      .attr(&quot;transform&quot;, function (d) { return &quot;translate(&quot; + xView(d.x) + &quot;,&quot; + yScale(d.y) + &quot;)&quot;; });

    merged.select(&quot;circle&quot;).attr(&quot;fill&quot;, function (d) { return cssVar(d.colorVar); });
    merged.select(&quot;text&quot;)
      .attr(&quot;text-anchor&quot;, function (d) { return xView(d.x) &gt; innerWidth * 0.72 ? &quot;end&quot; : &quot;start&quot;; })
      .attr(&quot;dx&quot;, function (d) { return xView(d.x) &gt; innerWidth * 0.72 ? -8 : 8; })
      .text(function (d) { return d.label; });
  }

  function renderEndpointLabels(domain) {
    const primaryIds = new Set([&quot;gpt&quot;, &quot;deepseek&quot;, &quot;akash&quot;, &quot;owned&quot;]);
    const showLabels = viewMode === &quot;focus&quot; &amp;&amp; innerWidth &gt;= 430 &amp;&amp;
      domain[0] &lt;= focusMaxTokensM &amp;&amp; domain[1] &gt;= focusMaxTokensM * 0.98;
    const shortNames = {
      gpt: &quot;GPT-5.6 frontier&quot;,
      deepseek: &quot;DeepSeek API&quot;,
      akash: &quot;Akash Llama&quot;,
      owned: &quot;Owned Llama&quot;
    };
    const labelData = showLabels ? visibleSeries().filter(function (item) {
      return primaryIds.has(item.id);
    }) : [];

    const labels = plot.select(&quot;.endpoint-layer&quot;)
      .selectAll(&quot;text&quot;)
      .data(labelData, function (d) { return d.id; });
    labels.exit().remove();
    labels.enter().append(&quot;text&quot;)
      .attr(&quot;class&quot;, &quot;endpoint-label text-small&quot;)
      .attr(&quot;text-anchor&quot;, &quot;end&quot;)
      .merge(labels)
      .attr(&quot;x&quot;, innerWidth - 6)
      .attr(&quot;y&quot;, function (d) { return yScale(d.cost(focusMaxTokensM)) - 7; })
      .text(function (d) {
        return shortNames[d.id] + &quot; · &quot; + formatCompactCurrency(d.cost(focusMaxTokensM)) + &quot;/mo&quot;;
      });
  }

  function renderPlot() {
    if (!plot) return;
    const activeSeries = visibleSeries();
    const lowerBound = viewMode === &quot;focus&quot; ? 0 : minTokensM;
    const domain = xView.domain().map(function (v) {
      return Math.max(lowerBound, Math.min(viewMode === &quot;focus&quot; ? focusMaxTokensM : maxTokensM, v));
    });
    const upper = d3.max(activeSeries, function (item) { return item.cost(domain[1]); }) || 1;
    if (viewMode === &quot;focus&quot;) yScale.domain([0, focusMaxCost]);
    else yScale.domain([0, upper * 1.08]).nice();

    const yTicks = yScale.ticks(6);
    plot.select(&quot;.y-grid&quot;)
      .call(d3.axisLeft(yScale).tickValues(yTicks).tickSize(-innerWidth).tickFormat(&quot;&quot;));
    plot.select(&quot;.y-axis&quot;)
      .call(d3.axisLeft(yScale).tickValues(yTicks).tickFormat(formatCompactCurrency));

    const xTicks = tickValuesFor(domain);
    plot.select(&quot;.x-axis&quot;)
      .attr(&quot;transform&quot;, &quot;translate(0,&quot; + innerHeight + &quot;)&quot;)
      .call(d3.axisBottom(xView).tickValues(xTicks).tickFormat(formatTokenTick));

    const paths = plot.select(&quot;.series-layer&quot;)
      .selectAll(&quot;path&quot;)
      .data(activeSeries, function (d) { return d.id; });

    paths.exit().remove();
    paths.enter()
      .append(&quot;path&quot;)
      .attr(&quot;class&quot;, &quot;series-path&quot;)
      .merge(paths)
      .attr(&quot;stroke&quot;, function (d) { return cssVar(d.colorVar); })
      .attr(&quot;stroke-width&quot;, function (d) { return d.width; })
      .attr(&quot;stroke-dasharray&quot;, function (d) { return d.dash || null; })
      .attr(&quot;d&quot;, function (d) {
        const points = d.nodeCost ? sampleInfrastructure(d, domain) : sampleApi(d, domain);
        return d3.line()
          .x(function (p) { return xView(p[0]); })
          .y(function (p) { return yScale(p[1]); })
          .curve(d.nodeCost ? d3.curveStepAfter : d3.curveLinear)(points);
      });

    renderCrossovers(domain);
    renderEndpointLabels(domain);
    updateSelection();
  }

  function applyViewMode(nextMode) {
    viewMode = nextMode === &quot;full&quot; ? &quot;full&quot; : &quot;focus&quot;;
    rangeSelect.value = viewMode;
    if (viewMode === &quot;focus&quot; &amp;&amp; selectedTokensM &gt; focusMaxTokensM) selectedTokensM = 5000;
    xBase = viewMode === &quot;focus&quot;
      ? d3.scaleLinear().domain([0, focusMaxTokensM]).range([0, innerWidth]).clamp(true)
      : d3.scaleLog().domain([minTokensM, maxTokensM]).range([0, innerWidth]).clamp(true);
    xView = xBase.copy();
    suppressZoom = true;
    svg.call(zoom.transform, d3.zoomIdentity);
    suppressZoom = false;
    currentTransform = d3.zoomIdentity;
    tooltip.style.opacity = &quot;0&quot;;
    if (plot) {
      plot.select(&quot;.x-axis-label&quot;).text(viewMode === &quot;focus&quot;
        ? &quot;Monthly total tokens · linear 0–8B&quot;
        : &quot;Monthly total tokens · logarithmic 1M–300B&quot;);
    }
    renderPlot();
  }

  const zoom = d3.zoom()
    .scaleExtent([1, 40])
    .on(&quot;zoom&quot;, function (event) {
      if (suppressZoom || !xBase) return;
      currentTransform = event.transform;
      xView = currentTransform.rescaleX(xBase);
      renderPlot();
    });

  function layout() {
    const nextWidth = Math.max(300, Math.round(wrap.getBoundingClientRect().width));
    if (nextWidth === width &amp;&amp; plot) return;
    width = nextWidth;
    height = width &gt;= 760 ? 500 : width &gt;= 500 ? 430 : 360;
    margins = width &gt;= 500
      ? {top: 18, right: 20, bottom: 64, left: 76}
      : {top: 14, right: 10, bottom: 62, left: 58};
    innerWidth = Math.max(1, width - margins.left - margins.right);
    innerHeight = Math.max(1, height - margins.top - margins.bottom);

    svg.attr(&quot;viewBox&quot;, &quot;0 0 &quot; + width + &quot; &quot; + height).attr(&quot;height&quot;, height);
    svg.selectAll(&quot;g.chart-root&quot;).remove();

    plot = svg.append(&quot;g&quot;)
      .attr(&quot;class&quot;, &quot;chart-root&quot;)
      .attr(&quot;transform&quot;, &quot;translate(&quot; + margins.left + &quot;,&quot; + margins.top + &quot;)&quot;);

    plot.append(&quot;g&quot;).attr(&quot;class&quot;, &quot;grid y-grid&quot;);
    plot.append(&quot;g&quot;).attr(&quot;class&quot;, &quot;axis y-axis&quot;);
    plot.append(&quot;g&quot;).attr(&quot;class&quot;, &quot;axis x-axis&quot;);
    plot.append(&quot;g&quot;).attr(&quot;class&quot;, &quot;series-layer&quot;);
    plot.append(&quot;g&quot;).attr(&quot;class&quot;, &quot;annotation-layer&quot;);
    plot.append(&quot;g&quot;).attr(&quot;class&quot;, &quot;endpoint-layer&quot;);
    plot.append(&quot;line&quot;).attr(&quot;class&quot;, &quot;crosshair&quot;);
    plot.append(&quot;g&quot;).attr(&quot;class&quot;, &quot;selection-layer&quot;);

    plot.append(&quot;text&quot;)
      .attr(&quot;class&quot;, &quot;axis-title x-axis-label&quot;)
      .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
      .attr(&quot;x&quot;, innerWidth / 2)
      .attr(&quot;y&quot;, innerHeight + 50)
      .text(&quot;Monthly total tokens · linear 0–8B&quot;);

    plot.append(&quot;text&quot;)
      .attr(&quot;class&quot;, &quot;axis-title&quot;)
      .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
      .attr(&quot;transform&quot;, &quot;rotate(-90)&quot;)
      .attr(&quot;x&quot;, -innerHeight / 2)
      .attr(&quot;y&quot;, -56)
      .text(&quot;Monthly cost (USD)&quot;);

    overlay = plot.append(&quot;rect&quot;)
      .attr(&quot;class&quot;, &quot;hover-target&quot;)
      .attr(&quot;width&quot;, innerWidth)
      .attr(&quot;height&quot;, innerHeight)
      .on(&quot;mousemove&quot;, function (event) {
        const pointer = d3.pointer(event, this);
        const maxForView = viewMode === &quot;focus&quot; ? focusMaxTokensM : maxTokensM;
        selectedTokensM = Math.max(minTokensM, Math.min(maxForView, xView.invert(pointer[0])));
        updateSelection();
        tooltip.textContent = formatTokensLong(selectedTokensM);
        tooltip.style.opacity = &quot;1&quot;;
        const tooltipWidth = tooltip.getBoundingClientRect().width;
        const left = Math.max(tooltipWidth / 2 + 4, Math.min(width - tooltipWidth / 2 - 4, margins.left + pointer[0]));
        tooltip.style.left = left + &quot;px&quot;;
        tooltip.style.top = (margins.top + 4) + &quot;px&quot;;
      })
      .on(&quot;mouseleave&quot;, function () {
        tooltip.style.opacity = &quot;0&quot;;
      });

    yScale = d3.scaleLinear().range([innerHeight, 0]);

    zoom.extent([[0, 0], [innerWidth, innerHeight]])
      .translateExtent([[0, 0], [innerWidth, innerHeight]]);
    svg.call(zoom);
    currentTransform = d3.zoomIdentity;
    applyViewMode(viewMode);
  }

  slider.addEventListener(&quot;input&quot;, function () {
    selectedTokensM = sliderToTokens(slider.value);
    updateSelection();
  });

  groupToggles.forEach(function (control) {
    control.addEventListener(&quot;change&quot;, function () {
      renderPlot();
    });
  });

  rangeSelect.addEventListener(&quot;change&quot;, function () {
    applyViewMode(rangeSelect.value);
  });

  buildLegend();
  const resizeObserver = new ResizeObserver(function () { layout(); });
  resizeObserver.observe(wrap);
  requestAnimationFrame(layout);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });

  if (globalThis.lucide != null) {
    initialize();

    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
